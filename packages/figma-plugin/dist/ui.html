<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 12px;
      padding: 16px;
      color: #333;
      background: #fff;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #f5f5f5;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #22c55e; }
    .dot.connecting { background: #f59e0b; }
    .dot.disconnected { background: #ef4444; }
    .log {
      font-family: monospace;
      font-size: 11px;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      background: #fafafa;
      border-radius: 4px;
      border: 1px solid #eee;
    }
    .log-entry { margin-bottom: 2px; }
  </style>
</head>
<body>
  <h1>FigmaFast</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
  <div class="log" id="log"></div>

  <script>
    const WS_URL = 'ws://localhost:3056';
    const MAX_RECONNECT_DELAY = 30000;

    let ws = null;
    let reconnectDelay = 1000;
    let reconnectTimer = null;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logEl = document.getElementById('log');

    function log(msg) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      // Keep last 50 entries
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function setStatus(state, text) {
      statusDot.className = 'dot ' + state;
      statusText.textContent = text;
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      setStatus('connecting', 'Connecting...');
      log('Connecting to ' + WS_URL);

      try {
        ws = new WebSocket(WS_URL);
      } catch (err) {
        log('Failed to create WebSocket: ' + err.message);
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        log('Connected');
        reconnectDelay = 1000; // Reset backoff
        // Send handshake so server can verify data flows
        ws.send(JSON.stringify({ type: 'hello', ts: Date.now() }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          log('← ' + msg.type + (msg.id ? ' [' + msg.id.slice(0, 8) + ']' : ''));
          // Forward to plugin main thread
          parent.postMessage({ pluginMessage: msg }, '*');
        } catch (err) {
          log('Parse error: ' + err.message);
        }
      };

      ws.onclose = () => {
        setStatus('disconnected', 'Disconnected');
        log('Disconnected');
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose will fire after this
        setStatus('disconnected', 'Connection error');
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      log('Reconnecting in ' + (reconnectDelay / 1000) + 's...');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
        connect();
      }, reconnectDelay);
    }

    // Receive responses from plugin main thread → send back via WS
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (ws && ws.readyState === WebSocket.OPEN) {
        log('→ ' + msg.type + (msg.id ? ' [' + msg.id.slice(0, 8) + ']' : ''));
        ws.send(JSON.stringify(msg));
      } else {
        log('Cannot send — not connected');
      }
    };

    // Start connection
    connect();
  </script>
</body>
</html>
