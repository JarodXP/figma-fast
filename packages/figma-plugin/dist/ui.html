<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 12px;
      padding: 16px;
      color: #333;
      background: #fff;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #f5f5f5;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #22c55e; }
    .dot.connecting { background: #f59e0b; }
    .dot.disconnected { background: #ef4444; }
    .log {
      font-family: monospace;
      font-size: 11px;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      background: #fafafa;
      border-radius: 4px;
      border: 1px solid #eee;
    }
    .log-entry { margin-bottom: 2px; }
    .client-list {
      margin-top: 12px;
    }
    .client-list-header {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .client-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .client-item:hover { background: #f5f5f5; }
    .client-item.active { background: #e8f4fd; }
    .client-radio {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      position: relative;
    }
    .client-radio.active {
      border-color: #2563eb;
    }
    .client-radio.active::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2563eb;
    }
    .client-name {
      flex: 1;
      font-size: 12px;
    }
    .no-clients {
      color: #999;
      font-size: 11px;
      font-style: italic;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <h1>FigmaFast</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
  <div id="clientList" class="client-list">
    <div class="client-list-header">AI Clients</div>
    <div id="clientListItems"></div>
  </div>
  <div class="log" id="log"></div>

  <script>
    const WS_URL = 'ws://localhost:3056';
    const MAX_RECONNECT_DELAY = 30000;

    let ws = null;
    let reconnectDelay = 1000;
    let reconnectTimer = null;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logEl = document.getElementById('log');
    const clientListItems = document.getElementById('clientListItems');

    function log(msg) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      // Keep last 50 entries
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function setStatus(state, text) {
      statusDot.className = 'dot ' + state;
      statusText.textContent = text;
    }

    function renderClientList(clients) {
      clientListItems.innerHTML = '';
      if (!clients || clients.length === 0) {
        const noClients = document.createElement('div');
        noClients.className = 'no-clients';
        noClients.textContent = 'No AI clients connected';
        clientListItems.appendChild(noClients);
        return;
      }
      clients.forEach(function(client) {
        const item = document.createElement('div');
        item.className = 'client-item' + (client.isActive ? ' active' : '');

        const radio = document.createElement('div');
        radio.className = 'client-radio' + (client.isActive ? ' active' : '');

        const name = document.createElement('div');
        name.className = 'client-name';
        name.textContent = client.clientName;

        item.appendChild(radio);
        item.appendChild(name);

        if (!client.isActive) {
          item.addEventListener('click', function() {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'set_active_client', clientId: client.clientId }));
              log('→ set_active_client ' + client.clientName);
            }
          });
        }

        clientListItems.appendChild(item);
      });
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      setStatus('connecting', 'Connecting...');
      log('Connecting to ' + WS_URL);

      try {
        ws = new WebSocket(WS_URL);
      } catch (err) {
        log('Failed to create WebSocket: ' + err.message);
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        log('Connected');
        reconnectDelay = 1000; // Reset backoff
        // Send handshake so server can verify data flows
        ws.send(JSON.stringify({ type: 'hello', ts: Date.now() }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          log('← ' + msg.type + (msg.id ? ' [' + msg.id.slice(0, 8) + ']' : ''));
          // Handle client_list in UI -- do NOT forward to plugin main thread
          if (msg.type === 'client_list') {
            renderClientList(msg.clients);
            return;
          }
          // Forward to plugin main thread
          parent.postMessage({ pluginMessage: msg }, '*');
        } catch (err) {
          log('Parse error: ' + err.message);
        }
      };

      ws.onclose = () => {
        setStatus('disconnected', 'Disconnected');
        log('Disconnected');
        ws = null;
        renderClientList([]);
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose will fire after this
        setStatus('disconnected', 'Connection error');
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      log('Reconnecting in ' + (reconnectDelay / 1000) + 's...');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
        connect();
      }, reconnectDelay);
    }

    // Receive responses from plugin main thread → send back via WS
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (ws && ws.readyState === WebSocket.OPEN) {
        log('→ ' + msg.type + (msg.id ? ' [' + msg.id.slice(0, 8) + ']' : ''));
        ws.send(JSON.stringify(msg));
      } else {
        log('Cannot send — not connected');
      }
    };

    // Start connection
    connect();
  </script>
</body>
</html>
